<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tachi Chat | OLED Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="oled-theme">

    <div id="app">
        </div>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <div class="nav-item" onclick="navigate('/servidores')"><i class="fa-solid fa-server"></i><span>Canais</span></div>
        <div class="nav-item" onclick="navigate('/chat')"><i class="fa-solid fa-comment-dots"></i><span>DMs</span></div>
        <div class="nav-item" onclick="navigate('/perfil')"><i class="fa-solid fa-user-gear"></i><span>Perfil</span></div>
    </nav>

    <div id="overlay" class="overlay hidden" onclick="closeAllModals()"></div>

    <div id="msg-menu" class="bottom-sheet hidden">
        <div class="sheet-handle"></div>
        <div class="sheet-content" id="msg-menu-content"></div>
    </div>

    <div id="modal-generic" class="modal hidden"></div>

    <script type="module" src="/script.js"></script>
</body>
</html>
