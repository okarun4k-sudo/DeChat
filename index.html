<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord OLED</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="black-theme">

    <section id="login-screen" class="spa-page">
        <div class="login-container">
            <i class="fa-brands fa-discord main-logo"></i>
            <h1>Bem-vindo!</h1>
            <p>Estamos muito animados em te ver!</p>
            <div class="input-group">
                <label>E-MAIL</label>
                <input type="email" id="email-input">
            </div>
            <div class="input-group">
                <label>SENHA</label>
                <input type="password" id="password-input">
            </div>
            <button id="btn-auth" class="btn-primary">Entrar / Cadastrar</button>
        </div>
    </section>

    <section id="app-screen" class="spa-page hidden">
        <aside class="sidebar" id="main-sidebar">
            <div class="server-list">
                <div class="server-icon home-icon active" id="btn-go-home">
                    <i class="fa-brands fa-discord"></i>
                </div>
                <div class="separator"></div>
                <div id="groups-list"></div>
                <div class="server-icon add-btn" id="btn-plus">
                    <i class="fa-solid fa-plus"></i>
                </div>
            </div>
        </aside>

        <main class="content-area">
            <header class="main-header">
                <div class="header-left">
                    <button id="mobile-menu-btn" class="icon-btn mobile-only"><i class="fa-solid fa-bars"></i></button>
                    <h3 id="chat-title"><i class="fa-solid fa-house"></i> Home</h3>
                </div>
                <div class="header-right">
                    <button id="btn-group-settings" class="icon-btn hidden"><i class="fa-solid fa-gear"></i></button>
                    <div class="dropdown">
                        <button id="btn-dots" class="icon-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                        <div id="menu-dropdown" class="dropdown-content">
                            <button id="btn-view-profile"><i class="fa-solid fa-user"></i> Meu Perfil</button>
                            <button id="btn-logout" class="danger"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
                        </div>
                    </div>
                </div>
            </header>

            <div id="chat-messages" class="chat-messages">
                <div class="welcome-home">
                    <i class="fa-solid fa-face-smile"></i>
                    <h2>Selecione um grupo ou crie um novo para começar a conversar!</h2>
                </div>
            </div>
            
            <div id="typing-text"></div>
            <div class="input-wrapper hidden" id="chat-input-container">
                <div class="input-area">
                    <button class="icon-btn"><i class="fa-solid fa-circle-plus"></i></button>
                    <input type="text" id="msg-input" placeholder="Conversar...">
                </div>
            </div>
        </main>
    </section>

    <div id="overlay" class="overlay hidden">
        
        <div id="modal-profile" class="modal profile-card hidden">
            <div class="profile-banner"></div>
            <div class="profile-header">
                <div class="avatar-wrapper">
                    <img id="view-p-photo" src="https://via.placeholder.com/150" alt="Avatar">
                </div>
                <button id="btn-edit-profile-toggle" class="edit-pencil"><i class="fa-solid fa-pencil"></i></button>
            </div>
            
            <div class="profile-body">
                <div id="profile-view-mode">
                    <h2 id="view-p-name">Nome de Exibição</h2>
                    <p class="p-username" id="view-p-username">@username</p>
                    <div class="p-divider"></div>
                    <h4>SOBRE MIM</h4>
                    <p id="view-p-bio" class="p-bio-text">Sua bio aparece aqui...</p>
                </div>

                <div id="profile-edit-mode" class="hidden">
                    <label>NOME DE EXIBIÇÃO</label>
                    <input type="text" id="p-name">
                    <label>USERNAME (ÚNICO)</label>
                    <input type="text" id="p-username" placeholder="user123">
                    <label>LINK DA FOTO</label>
                    <input type="text" id="p-photo">
                    <label>BIO</label>
                    <textarea id="p-bio" maxlength="250"></textarea>
                    <button id="btn-save-profile" class="btn-primary">Salvar Alterações</button>
                </div>
            </div>
        </div>

        <div id="modal-plus" class="modal small hidden">
            <h3>Novo Início</h3>
            <button id="btn-show-search" class="btn-secondary"><i class="fa-solid fa-magnifying-glass"></i> Procurar Amigo</button>
            <button id="btn-show-create-group" class="btn-primary"><i class="fa-solid fa-users"></i> Criar Grupo</button>
        </div>

        <div id="modal-create-group" class="modal hidden">
            <h3>Personalize seu grupo</h3>
            <input type="text" id="g-name" placeholder="Nome do Grupo">
            <input type="text" id="g-photo" placeholder="URL da Imagem do Grupo">
            <textarea id="g-desc" placeholder="Descrição"></textarea>
            <button id="btn-confirm-group" class="btn-primary">Criar Grupo</button>
        </div>

        <div id="modal-search" class="modal hidden">
            <h3>Adicionar por Username</h3>
            <div class="search-bar">
                <input type="text" id="search-username" placeholder="Digite o username ex: user9301">
                <button id="btn-exec-search" class="btn-icon-only"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div id="search-res" class="result-box"></div>
        </div>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
