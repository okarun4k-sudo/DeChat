<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <div id="login-screen" class="screen">
        <div class="login-box">
            <h2>Bem-vindo!</h2>
            <input type="email" id="email-input" placeholder="E-mail (Gmail)">
            <input type="password" id="password-input" placeholder="Senha">
            <button id="btn-auth" class="btn-primary">Entrar / Cadastrar</button>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        <aside class="sidebar">
            <div class="server-icon active">D</div>
            <div id="groups-list"></div>
            <button id="btn-plus" class="server-icon add-btn">+</button>
        </aside>

        <main class="chat-container">
            <header class="chat-header">
                <h3 id="chat-title">Selecione um grupo</h3>
                <div class="header-icons">
                    <button id="btn-group-settings" class="icon-btn hidden">⚙️</button>
                    <div class="dropdown">
                        <button id="btn-dots" class="icon-btn">⋮</button>
                        <div id="menu-dropdown" class="dropdown-content">
                            <button id="btn-open-profile">Perfil</button>
                            <button id="btn-logout">Sair</button>
                        </div>
                    </div>
                </div>
            </header>

            <div id="chat-messages" class="chat-messages"></div>
            
            <div id="typing-text"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Enviar mensagem..." disabled>
            </div>
        </main>
    </div>

    <div id="overlay" class="overlay hidden">
        <div id="modal-profile" class="modal hidden">
            <h3>Meu Perfil</h3>
            <label>Nome de Exibição</label>
            <input type="text" id="p-name">
            <label>Username (ex: user9301)</label>
            <input type="text" id="p-username" placeholder="Será usado para te achar">
            <label>Link da Foto</label>
            <input type="text" id="p-photo">
            <label>Bio (250 caracteres)</label>
            <textarea id="p-bio" maxlength="250"></textarea>
            <button id="btn-save-profile" class="btn-primary">Salvar Perfil</button>
        </div>

        <div id="modal-plus" class="modal hidden">
            <h3>O que deseja fazer?</h3>
            <button id="btn-show-search" class="btn-secondary">Procurar Amigo</button>
            <button id="btn-show-create-group" class="btn-primary">Criar Grupo</button>
        </div>

        <div id="modal-create-group" class="modal hidden">
            <h3>Novo Grupo</h3>
            <input type="text" id="g-name" placeholder="Nome do Grupo">
            <input type="text" id="g-photo" placeholder="Link da Foto">
            <textarea id="g-desc" placeholder="Descrição (aceita links)"></textarea>
            <button id="btn-confirm-group" class="btn-primary">Criar</button>
        </div>

        <div id="modal-search" class="modal hidden">
            <h3>Buscar Usuário</h3>
            <input type="text" id="search-username" placeholder="Username ex: user9301">
            <button id="btn-exec-search" class="btn-primary">Buscar</button>
            <div id="search-res" class="result-box"></div>
        </div>

        <div id="modal-group-settings" class="modal hidden">
            <h3>Configurar Grupo</h3>
            <input type="text" id="edit-g-name">
            <input type="text" id="edit-g-photo">
            <textarea id="edit-g-desc"></textarea>
            <button id="btn-update-group" class="btn-primary">Salvar</button>
            <hr>
            <h4>Adicionar Membro</h4>
            <input type="text" id="add-member-input" placeholder="Username">
            <button id="btn-add-member" class="btn-secondary">Adicionar</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
